# copilot_policy.yaml — AI usage policy for St. Augustine Lutheran School & Parish
# Adapted from the course starter for Project 1; tuned to a lone-admin parish shop.
version: 1
owner: "admin@staugustine.example.org"   # placeholder — never a real address/secret
last_reviewed: "2026-06-25"
accountable_human: "Sareena Challuri"     # the lone systems administrator

autonomy_levels:
  - { rung: 0, name: observe,           description: "AI reads logs and summarizes. No writes." }
  - { rung: 1, name: suggest,           description: "AI drafts runbooks/configs. Human reviews EVERY line." }
  - { rung: 2, name: act_with_approval, description: "AI may execute, but only after explicit human approval. Audited." }
  - { rung: 3, name: autonomous,        description: "No per-action approval. NOT ALLOWED at St. Augustine." }

# What the copilot may do, by task. (3+ mappings changed from the starter for our shop.)
tasks:
  draft_runbook:        { max_rung: 1, requires_human_verify: true }
  summarize_incident:   { max_rung: 1, requires_human_verify: true }
  restart_ministry_web: { max_rung: 1, requires_human_verify: true }   # CHANGED: donor-facing; human restarts it
  edit_nginx_config:    { max_rung: 1, requires_human_verify: true }   # CHANGED: never auto-apply web config
  delete_logs_or_data:  { max_rung: 0 }                                # CHANGED: AI may only observe; a human deletes
  take_backup:          { max_rung: 2, requires_human_verify: true, audit_log: true }

never_delegate:
  - "Any irreversible action (rm -rf, dropping data, deleting the giving database)."
  - "Approving its own change (no self-approval)."
  - "Editing the giving/payment portal config without a human reading every line."

# Required in EVERY runbook an AI helped produce — must name an accountable human.
required_in_every_runbook:
  ai_tool_and_model:       "e.g. Claude Opus 4.8 (claude-opus-4-8), 2026"
  what_was_delegated:      "the exact prompt / task given to the AI"
  what_the_human_verified: "the lines checked, and how (e.g. run on the lab box)"
  accountable_human:       "Sareena Challuri"   # a person, never a team alias